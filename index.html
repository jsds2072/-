<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">계산기</h1>
      <p class="hint" aria-live="polite">키보드로 숫자·연산·Enter·Esc 사용 가능</p>
    </header>

    <div class="calculator" role="application" aria-label="계산기">
      <div class="display" aria-live="polite">
        <div class="display__sub" id="subDisplay" aria-hidden="true"></div>
        <div class="display__main" id="mainDisplay">0</div>
      </div>

      <div class="keys" id="keys">
        <button type="button" class="key key--fn" data-action="clear" aria-label="전체 지우기">AC</button>
        <button type="button" class="key key--fn" data-action="sign" aria-label="부호 바꾸기">±</button>
        <button type="button" class="key key--fn" data-action="percent" aria-label="퍼센트">%</button>
        <button type="button" class="key key--op" data-action="operator" data-op="/" aria-label="나누기">÷</button>

        <button type="button" class="key" data-action="digit" data-value="7">7</button>
        <button type="button" class="key" data-action="digit" data-value="8">8</button>
        <button type="button" class="key" data-action="digit" data-value="9">9</button>
        <button type="button" class="key key--op" data-action="operator" data-op="*" aria-label="곱하기">×</button>

        <button type="button" class="key" data-action="digit" data-value="4">4</button>
        <button type="button" class="key" data-action="digit" data-value="5">5</button>
        <button type="button" class="key" data-action="digit" data-value="6">6</button>
        <button type="button" class="key key--op" data-action="operator" data-op="-" aria-label="빼기">−</button>

        <button type="button" class="key" data-action="digit" data-value="1">1</button>
        <button type="button" class="key" data-action="digit" data-value="2">2</button>
        <button type="button" class="key" data-action="digit" data-value="3">3</button>
        <button type="button" class="key key--op" data-action="operator" data-op="+" aria-label="더하기">+</button>

        <button type="button" class="key key--wide" data-action="digit" data-value="0">0</button>
        <button type="button" class="key" data-action="decimal" aria-label="소수점">.</button>
        <button type="button" class="key key--op key--equals" data-action="equals" aria-label="결과">=</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
